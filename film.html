<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DİFİLZA - Film İzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .film-page {
            padding-top: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #6c5ce7;
        }

        .player-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .film-details {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .film-poster {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        .film-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .film-poster .no-poster {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #333;
        }

        .film-info h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .film-info .original-title {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        .film-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .film-meta span {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .film-meta .imdb {
            color: #f5c518;
            font-weight: 600;
        }

        .film-meta .category {
            background: rgba(108, 92, 231, 0.2);
            color: #a29bfe;
        }

        .film-description {
            color: #999;
            line-height: 1.8;
            font-size: 15px;
        }

        .loading-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .film-details {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .film-poster {
                max-width: 200px;
            }

            .film-info h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-d">D</span>İFİL<span class="logo-z">Z</span>A
            </a>
            <nav>
                <a href="index.html">Ana Sayfa</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container film-page">
            <a href="index.html" class="back-btn">← Geri Dön</a>

            <div class="player-container" id="player">
                <div class="loading-player">Film yükleniyor...</div>
            </div>

            <div class="film-details">
                <div class="film-poster" id="filmPoster">
                    <div class="no-poster">🎬</div>
                </div>
                <div class="film-info">
                    <h1 id="filmTitle">-</h1>
                    <div class="original-title" id="originalTitle"></div>
                    <div class="film-meta">
                        <span id="filmYear">📅 -</span>
                        <span class="imdb" id="filmImdb">⭐ -</span>
                        <span class="category" id="filmCategory">📁 -</span>
                    </div>
                    <p class="film-description" id="filmDescription"></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 DİFİLZA. Tüm hakları saklıdır.</p>
        </div>
    </footer>

    <script>
        const API_URL = 'https://difilza.onrender.com';

        async function loadFilm() {
            const params = new URLSearchParams(window.location.search);
            const filmId = params.get('id');

            if (!filmId) {
                document.getElementById('player').innerHTML = '<div class="loading-player">Film ID bulunamadı</div>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/films/${filmId}`);
                const film = await response.json();

                document.title = `${film.title} - DİFİLZA`;

                document.getElementById('filmTitle').textContent = film.title;
                document.getElementById('originalTitle').textContent = film.originalTitle || '';
                document.getElementById('filmYear').textContent = `📅 ${film.year || '-'}`;
                document.getElementById('filmImdb').textContent = `⭐ ${film.imdb || '-'}`;
                document.getElementById('filmCategory').textContent = `📁 ${film.category || 'Genel'}`;
                document.getElementById('filmDescription').textContent = film.description || 'Açıklama bulunmuyor.';

                if (film.poster) {
                    document.getElementById('filmPoster').innerHTML = `<img src="${film.poster}" alt="${film.title}">`;
                }

                document.getElementById('player').innerHTML = `<iframe src="${film.embedUrl}" allowfullscreen allow="autoplay; fullscreen" frameborder="0"></iframe>`;

            } catch (error) {
                document.getElementById('player').innerHTML = '<div class="loading-player">Film yüklenirken hata oluştu</div>';
            }
        }

        loadFilm();
    </script>
</body>
</html>
